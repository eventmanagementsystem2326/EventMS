<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trisha EMS | Summary Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="summaryReport">
  <div class="page-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="admin-dashboard.html"><img src="assets/college-logo.png" alt="Trisha logo"><div class="brand-copy"><strong>Trisha EMS</strong><span>Summary report builder</span></div></a>
        <nav class="nav-links">
          <a data-nav href="admin-dashboard.html">Dashboard</a>
          <a data-nav href="manage-events.html">Events</a>
          <a data-nav href="manage-competitions.html">Competitions</a>
          <a data-nav href="manage-homescreen.html">Highlights</a>
          <a data-nav href="manage-contacts.html">Contacts</a>
          <a data-nav href="manage-options.html">Options</a>
          <a data-nav href="activity-report.html">Activities</a>
          <a data-nav href="participants-report.html">Reports</a>
          <a data-nav href="summary-report.html">Summary</a>
          <a href="#" class="logout-link">Logout</a>
        </nav>
      </div>
    </header>
    <section class="page-section">
      <div class="container stack">
        <article class="panel">
          <div class="toolbar">
            <select id="summaryClubFilter"><option value="">All clubs</option></select>
            <select id="typeSelect"><option value="">Select type</option><option value="event">Event</option><option value="competition">Competition</option></select>
            <select id="itemSelect"><option value="">Select item</option></select>
            <button class="btn" id="summaryDownload" type="button">Download PDF</button>
          </div>
        </article>
        <article class="panel" id="summaryPreview"></article>
      </div>
    </section>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="assets/app.js" defer></script>
</body>
</html>
